name: CI

# Runs on every push to main and every PR targeting main.
# Validates that the semantic-map Go module builds, vets clean, and that
# the full test suite (compliance + scenarios + evolution + integration)
# passes with race detection on.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test + vet
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: semantic-map/go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: semantic-map/go/go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum need 'go mod tidy'"
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race detector, 5m timeout)
        run: go test -race -timeout 5m ./...

  demo:
    name: dev.sh demo (smoke)
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: semantic-map/go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: semantic-map/go/go.sum

      - name: Run guided demo in paper mode
        run: ./dev.sh demo --paper
